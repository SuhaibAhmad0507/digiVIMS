<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>digiVIMS — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    :root {
      --navy: #0B1426; --navy-mid: #121F38; --navy-light: #1A2D50;
      --teal: #0EA87A; --teal-dim: #0C8C66; --teal-glow: rgba(14,168,122,0.15);
      --red: #E5534B; --white: #F0F4F8; --muted: #7B91B0;
      --border: rgba(255,255,255,0.07);
      --font-head: 'Barlow Condensed', sans-serif;
      --font-body: 'IBM Plex Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; background: var(--navy); color: var(--white);
      font-family: var(--font-body); display: flex; align-items: center; justify-content: center;
    }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px; opacity: 0.4;
    }
    /* Decorative teal blob */
    body::after {
      content: ''; position: fixed; top: -100px; right: -100px;
      width: 400px; height: 400px; border-radius: 50%;
      background: radial-gradient(circle, rgba(14,168,122,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-wrapper {
      position: relative; z-index: 1;
      width: 100%; max-width: 400px; padding: 24px;
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-brand {
      text-align: center; margin-bottom: 40px;
    }
    .brand-mark {
      font-family: var(--font-head); font-size: 42px; font-weight: 700;
      letter-spacing: 4px; color: var(--teal);
    }
    .brand-sub {
      font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--muted); margin-top: 4px;
    }
    .brand-divider {
      width: 40px; height: 3px; background: var(--teal);
      margin: 14px auto 0; border-radius: 2px;
    }

    .login-card {
      background: #131E33; border: 1px solid var(--border);
      border-radius: 16px; padding: 32px;
    }
    .login-heading {
      font-family: var(--font-head); font-size: 18px; font-weight: 700;
      letter-spacing: 1px; color: var(--white); margin-bottom: 24px;
    }

    .field-group { margin-bottom: 18px; }
    .field-label {
      display: block; font-size: 11px; font-weight: 600;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 8px;
    }
    .field-input {
      width: 100%; background: var(--navy-light); border: 1px solid var(--border);
      color: var(--white); padding: 11px 14px; border-radius: 8px;
      font-family: var(--font-body); font-size: 14px; outline: none;
      transition: border-color 0.15s;
    }
    .field-input:focus { border-color: var(--teal); }
    .field-input::placeholder { color: var(--muted); }

    .btn-sign-in {
      width: 100%; padding: 12px; border-radius: 8px;
      background: var(--teal); color: white; border: none;
      font-family: var(--font-head); font-size: 16px; font-weight: 700;
      letter-spacing: 1px; cursor: pointer; margin-top: 8px;
      transition: background 0.15s;
    }
    .btn-sign-in:hover { background: var(--teal-dim); }

    .error-msg {
      background: rgba(229,83,75,0.1); border: 1px solid rgba(229,83,75,0.3);
      color: var(--red); padding: 10px 14px; border-radius: 8px;
      font-size: 13px; display: flex; align-items: center; gap: 8px;
      margin-bottom: 16px;
    }

    .login-footer {
      text-align: center; margin-top: 24px;
      font-size: 11px; color: var(--muted); letter-spacing: 0.5px;
    }
    .login-footer span { color: var(--teal); }
  </style>
</head>
<body>
<div class="login-wrapper">
  <div class="login-brand">
    <div class="brand-mark">digiVIMS</div>
    <div class="brand-sub">Digital Voter Information &amp; Management System</div>
    <div class="brand-divider"></div>
  </div>

  <div class="login-card">
    <div class="login-heading">SYSTEM ACCESS</div>

    {% for message in messages %}
    <div class="error-msg">
      <i class="bi bi-exclamation-circle"></i> {{ message }}
    </div>
    {% endfor %}

    <form method="post">
      {% csrf_token %}
      <div class="field-group">
        <label class="field-label">Username</label>
        <input type="text" name="username" class="field-input"
               placeholder="Enter username" autofocus
               value="{{ form.username.value|default:'' }}"/>
      </div>
      <div class="field-group">
        <label class="field-label">Password</label>
        <input type="password" name="password" class="field-input"
               placeholder="Enter password"/>
      </div>
      <button type="submit" class="btn-sign-in">SIGN IN</button>
    </form>
  </div>

  <div class="login-footer">
    IMSciences &nbsp;·&nbsp; Database Lab &nbsp;·&nbsp;
    <span>Suhaib Ahmad &amp; Muhammad Rehan Khan</span>
  </div>
</div>
</body>
</html>
